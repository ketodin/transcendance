name: "docs — Documentation"
description: Documentation only.
labels: ["type: docs", "status: todo"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - frontend
        - backend
        - auth
        - game
        - db
        - shared
        - infra
        - i18n
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What documentation is being added or changed.
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      value: "- [ ] "
    validations:
      required: true
