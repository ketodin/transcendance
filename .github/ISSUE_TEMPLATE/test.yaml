name: "test — Tests"
description: Adding or updating tests.
labels: ["type: test", "status: todo"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - frontend
        - backend
        - auth
        - game
        - db
        - shared
        - infra
        - i18n
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is being tested and what coverage is added.
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      value: "- [ ] "
    validations:
      required: true
