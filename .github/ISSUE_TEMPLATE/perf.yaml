name: "perf — Performance"
description: "Performance improvement, particularly game loop and rendering."
labels: ["type: perf", "status: todo"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - frontend
        - backend
        - auth
        - game
        - db
        - shared
        - infra
        - i18n
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is slow, what is the target improvement, and how it will be measured.
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      value: "- [ ] "
    validations:
      required: true
