name: "security — Security"
description: "Auth, JWT, OAuth, 2FA, session, input validation."
labels: ["type: security", "status: todo"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - frontend
        - backend
        - auth
        - game
        - db
        - shared
        - infra
        - i18n
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the vulnerability or security concern and what is the fix.
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      value: "- [ ] "
    validations:
      required: true
